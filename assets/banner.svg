</g>

<!-- REALISTIC BEE 2 -->

<g class="bee2">

<ellipse cx="980" cy="340" rx="20" ry="13" fill="#FFD600"/>

<rect x="970" y="328" width="5" height="24" fill="#111"/>
<rect x="980" y="328" width="5" height="24" fill="#111"/>
<rect x="990" y="328" width="5" height="24" fill="#111"/>

<ellipse class="wing" cx="970" cy="314" rx="14" ry="8"
fill="#F2F2F2" opacity="0.9"/>

<ellipse class="wing" cx="992" cy="314" rx="14" ry="8"
fill="#F2F2F2" opacity="0.9"/>

<circle cx="1000" cy="338" r="3" fill="#111"/>

